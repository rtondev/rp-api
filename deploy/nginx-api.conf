# Rota Potiguar — API
# Copiar: sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/api.rotapotiguar.com
# Ativar: sudo ln -sf /etc/nginx/sites-available/api.rotapotiguar.com /etc/nginx/sites-enabled/
#
# Depois rode: sudo bash deploy/setup-api-ssl.sh seu@email.com
# (ou: sudo certbot --nginx -d api.rotapotiguar.com)

server {
    listen 80;
    listen [::]:80;
    server_name api.rotapotiguar.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:6000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

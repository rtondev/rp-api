# Desenvolvimento local — portas: API 3001, Postgres 5433
# Produção VPS: use docker-compose.prod.yml (API 6000)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rota
      POSTGRES_PASSWORD: rota123
      POSTGRES_DB: rota_potiguar
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rota -d rota_potiguar"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3001}:${API_PORT:-3001}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rota:rota123@db:5432/rota_potiguar
      JWT_SECRET: rota-potiguar-dev-secret-change-in-production
      PORT: ${API_PORT:-3001}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
